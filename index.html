<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型接口测试面板</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- 左侧：配置区 -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4 border-b pb-2 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    全局配置
                </h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">中转站规范</label>
                        <select id="station-select"
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500">
                            <option value="bc_openai">Burncloud (OpenAI 规范)</option>
                            <option value="bc_anthropic">Burncloud (Anthropic 规范)</option>
                            <option value="bc_gemini">Burncloud (Gemini 规范)</option>
                            <option value="pinova">Pinova (OpenAI 规范)</option>
                            <option value="pinova_gemini">Pinova (Gemini 原生)</option>
                            <option value="custom">自定义站点 (Custom)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Base URL / 官网地址</label>
                        <input type="text" id="base-url"
                            class="w-full bg-gray-100 border-gray-300 text-gray-500 rounded-md shadow-sm p-2 border font-mono text-sm transition-colors"
                            readonly>
                    </div>
                    <div id="custom-endpoint-container" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-1">API 路径 (Endpoint)</label>
                        <input type="text" id="custom-endpoint"
                            class="w-full bg-white border-gray-300 rounded-md shadow-sm p-2 border font-mono text-sm"
                            value="/v1/chat/completions">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                        <input type="password" id="api-key"
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 border font-mono text-sm"
                            placeholder="sk-...">
                    </div>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <div class="flex border-b mb-4">
                    <button id="tab-text"
                        class="flex-1 py-2 text-center border-b-2 border-blue-600 font-bold text-blue-600 transition-colors">文本模型</button>
                    <button id="tab-image"
                        class="flex-1 py-2 text-center border-b-2 border-transparent font-medium text-gray-500 transition-colors">图像模型</button>
                </div>

                <!-- 文本 -->
                <div id="panel-text" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">模型 ID</label>
                        <input type="text" id="text-model-id"
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 border" value="gpt-3.5-turbo">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Prompt</label>
                        <textarea id="text-prompt" rows="4"
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 border"
                            placeholder="输入测试内容..."></textarea>
                    </div>
                    <button id="btn-submit-text"
                        class="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-700 flex justify-center items-center h-10 transition-colors">
                        <span>发送测试</span>
                        <div id="spinner-text" class="loader ml-2 hidden border-white border-t-blue-200"></div>
                    </button>
                </div>

                <!-- 图像 -->
                <div id="panel-image" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">模型 ID</label>
                        <input type="text" id="image-model-id"
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 border" value="gpt-image-2">
                    </div>

                    <div class="space-y-2" id="drop-area">
                        <div class="flex justify-between items-center">
                            <label class="block text-sm font-medium text-gray-700">参考图 / 拖入本地文件</label>
                            <button id="btn-force-upload"
                                class="text-[10px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded hover:bg-blue-100 hidden">重试生成
                                URL</button>
                        </div>
                        <div class="flex flex-col gap-2">
                            <input type="text" id="image-ref-url"
                                class="w-full border-gray-300 rounded-md shadow-sm p-2 border text-sm font-mono transition-colors"
                                placeholder="粘贴 HTTPS 地址，或拖入本地文件后自动生成">
                            <div class="flex items-center gap-2">
                                <label
                                    class="flex-1 cursor-pointer bg-gray-50 hover:bg-gray-100 border border-dashed border-gray-300 rounded-md py-2 text-center text-xs text-gray-600 transition-colors">
                                    <span id="file-label">选择图片</span>
                                    <input type="file" id="image-file-input" class="hidden" accept="image/*">
                                </label>
                                <button id="btn-clear-img"
                                    class="px-3 py-2 bg-red-50 text-red-600 text-xs rounded-md border border-red-100 hover:bg-red-100 hidden">清除</button>
                            </div>
                        </div>
                        <div id="upload-status-bar" class="hidden">
                            <div class="w-full bg-gray-200 rounded-full h-1.5 mt-1 overflow-hidden">
                                <div id="upload-progress" class="bg-blue-500 h-full transition-all duration-300"
                                    style="width: 0%"></div>
                            </div>
                            <p id="upload-status-text" class="text-[10px] text-gray-400 mt-1 font-mono text-center"></p>
                        </div>
                        <div id="img-preview-box"
                            class="hidden mt-2 relative border rounded-md p-1 bg-gray-100 h-20 w-fit overflow-hidden shadow-inner">
                            <img id="img-preview" src="" class="h-full w-auto object-contain">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">提示词 (Prompt)</label>
                        <textarea id="image-prompt" rows="3"
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 border"
                            placeholder="生图或修图指令..."></textarea>
                    </div>

                    <details class="group border border-gray-200 rounded-md shadow-sm" id="image-params-details">
                        <summary
                            class="flex justify-between items-center cursor-pointer p-3 bg-gray-50 text-xs hover:bg-gray-100">
                            <span>高级参数 (分辨率、格式)</span>
                            <span class="transition group-open:rotate-180">▼</span>
                        </summary>
                        <div class="p-4 bg-white border-t border-gray-200 grid grid-cols-2 gap-4">
                            <div id="size-param-container">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1">尺寸 (Size)</label>
                                <select id="image-size" class="w-full border-gray-300 rounded-md p-1 border text-xs">
                                    <option value="auto">Auto</option>
                                    <option value="1024x1024">1024x1024</option>
                                    <option value="2048x2048">2048x2048</option>
                                    <option value="3840x2160">3840x2160</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 mb-1">格式 (Format)</label>
                                <select id="image-format" class="w-full border-gray-300 rounded-md p-1 border text-xs">
                                    <option value="png">PNG</option>
                                    <option value="jpeg">JPEG</option>
                                    <option value="webp">WebP</option>
                                </select>
                            </div>
                        </div>
                    </details>
                    <button id="btn-submit-image"
                        class="w-full bg-indigo-600 text-white font-medium py-2 rounded-md hover:bg-indigo-700 flex justify-center items-center h-10 transition-colors">
                        <span>发送测试请求</span>
                        <div id="spinner-image" class="loader ml-2 hidden border-white border-t-indigo-200"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- 右侧：结果与日志 -->
        <div class="lg:col-span-2 space-y-6 flex flex-col">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col min-h-[300px]">
                <h2 class="text-lg font-bold mb-4 border-b pb-2 flex justify-between items-center">
                    <span>响应渲染 (Result)</span>
                    <span id="status-badge" class="px-2 py-1 text-[10px] rounded bg-gray-100 hidden"></span>
                </h2>
                <div id="result-container"
                    class="flex-1 bg-gray-50 rounded border p-4 overflow-auto flex items-center justify-center relative">
                    <p class="text-gray-400 text-sm">等待请求响应...</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex-col h-[400px] gap-2 flex">
                <h2 class="text-sm font-bold flex justify-between items-center">
                    <span>调试日志 (JSON)</span>
                    <span class="text-[10px] font-normal text-gray-400 italic">超长 Base64 已自动截断显示</span>
                </h2>
                <div class="flex-1 flex flex-col gap-2 overflow-hidden">
                    <div class="flex-1 relative flex flex-col group">
                        <button onclick="copyFullJson('log-request')"
                            class="absolute right-2 top-6 z-10 opacity-0 group-hover:opacity-100 px-2 py-1 bg-gray-700 text-white text-[10px] rounded transition-opacity">复制完整</button>
                        <div class="text-[10px] text-gray-400 mb-1 font-mono uppercase tracking-widest pl-1">Request
                        </div>
                        <textarea id="log-request"
                            class="flex-1 bg-gray-900 text-green-400 p-3 rounded font-mono text-[11px] focus:ring-1 focus:ring-green-500 outline-none w-full"
                            spellcheck="false"></textarea>
                    </div>
                    <div class="flex-1 relative flex flex-col group">
                        <button onclick="copyFullJson('log-response')"
                            class="absolute right-2 top-6 z-10 opacity-0 group-hover:opacity-100 px-2 py-1 bg-gray-700 text-white text-[10px] rounded transition-opacity">复制完整</button>
                        <div class="text-[10px] text-gray-400 mb-1 font-mono uppercase tracking-widest pl-1">Response
                        </div>
                        <textarea id="log-response"
                            class="flex-1 bg-gray-900 text-yellow-300 p-3 rounded font-mono text-[11px] focus:ring-1 focus:ring-yellow-500 outline-none w-full"
                            readonly></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入分离出的 JS 文件 (防缓存) -->
    <script src="main.js?v=2"></script>
</body>

</html>
