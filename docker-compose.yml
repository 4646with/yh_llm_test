version: '3.8'

services:
  llm-test-panel:
    build: .
    container_name: llm-test-panel
    # 端口映射已禁用，容器仅在内部使用
    environment:
      - PORT=3000
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s